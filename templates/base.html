<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{% block meta_description %}StoryBook AI — Create personalized, AI-generated children's stories with custom characters, themes, and moral lessons.{% endblock %}" />
  <title>{% block title %}StoryBook AI — Magical Stories For Every Child{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
  {% block head %}{% endblock %}
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="logo-icon">📚</span>
      <span class="logo-text">StoryBook AI</span>
    </a>

    <div class="navbar-nav" id="mainNav">
      <a href="/app" class="nav-link" id="navBuilder">✨ Create Story</a>
      <a href="/library" class="nav-link" id="navLibrary">📖 Library</a>
      <a href="/dashboard" class="nav-link" id="navDashboard">👨‍👩‍👧 Dashboard</a>
    </div>

    <div class="navbar-auth" id="navbarAuth">
      <!-- Populated by app.js -->
    </div>

    <button class="hamburger" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile Nav Drawer -->
  <div class="mobile-nav-overlay" id="mobileNavOverlay" onclick="App.closeMobileNav()"></div>
  <div class="mobile-nav" id="mobileNav">
    <a href="/app" class="mobile-nav-link">✨ Create Story</a>
    <a href="/library" class="mobile-nav-link">📖 Library</a>
    <a href="/dashboard" class="mobile-nav-link">👨‍👩‍👧 Dashboard</a>
  </div>

  <!-- ── Auth Modal ─────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="authModal" role="dialog" aria-modal="true" aria-label="Sign In">
    <div class="modal">
      <div class="modal-header">
        <h3 id="authModalTitle">✨ Welcome to StoryBook AI</h3>
        <button class="modal-close" id="authModalClose" aria-label="Close">✕</button>
      </div>

      <div id="authTabs" style="display:flex; gap:0.5rem; margin-bottom:1.5rem;">
        <button class="btn btn-primary btn-sm" id="tabLogin" onclick="App.switchAuthTab('login')">Sign In</button>
        <button class="btn btn-ghost btn-sm" id="tabRegister" onclick="App.switchAuthTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form" onsubmit="App.handleLogin(event)">
        <div class="form-group mb-2">
          <label class="form-label" for="loginUsername">Username</label>
          <input id="loginUsername" type="text" class="form-input" placeholder="your username" autocomplete="username" required />
        </div>
        <div class="form-group mb-3">
          <label class="form-label" for="loginPassword">Password</label>
          <input id="loginPassword" type="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <div id="loginError" class="text-small" style="color:var(--danger); margin-bottom:1rem; display:none;"></div>
        <button type="submit" id="loginSubmit" class="btn btn-primary w-full">
          <span id="loginSpinner" class="spinner hidden"></span>
          Sign In
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form hidden" onsubmit="App.handleRegister(event)">
        <div class="form-group mb-2">
          <label class="form-label" for="regUsername">Choose a Username</label>
          <input id="regUsername" type="text" class="form-input" placeholder="e.g. sarah_parent" autocomplete="username" required minlength="3" />
        </div>
        <div class="form-group mb-3">
          <label class="form-label" for="regPassword">Password</label>
          <input id="regPassword" type="password" class="form-input" placeholder="at least 6 characters" autocomplete="new-password" required minlength="6" />
        </div>
        <div id="registerError" class="text-small" style="color:var(--danger); margin-bottom:1rem; display:none;"></div>
        <button type="submit" id="registerSubmit" class="btn btn-primary w-full">
          <span id="registerSpinner" class="spinner hidden"></span>
          Create Account
        </button>
      </form>
    </div>
  </div>

  <!-- ── Loading Overlay ────────────────────────────────────────────── -->
  <div class="loading-overlay" id="storyLoadingOverlay">
    <div class="loading-book">📖</div>
    <div class="loading-text" id="storyLoadingTitle">Creating your story<span class="loading-dots"></span></div>
    <div class="progress-container" style="width: 250px; background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; margin: 1.5rem 0; overflow: hidden;">
      <div id="storyProgressBar" style="width: 0%; height: 100%; background: var(--color-accent); transition: width 0.5s ease;"></div>
    </div>
    <div class="loading-subtext" id="storyLoadingSubtext">About 40–60 seconds remaining…</div>
  </div>

  <!-- ── Toast Container ────────────────────────────────────────────── -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ── Page Content ───────────────────────────────────────────────── -->
  <main class="page-wrapper">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Server-injected auth state (eliminates async race condition) ──── -->
  <script>
    // This is set by Flask from the session before any JS runs.
    // app.js reads this synchronously — no fetch('/api/me') needed on load.
    window.INITIAL_AUTH = {{ (session_user | tojson) if session_user else 'null' }};
  </script>

  <!-- ── Global App Script ──────────────────────────────────────────────── -->
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
